<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toy Mondrian — social preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/social/og-preview.css" />
  </head>
  <body class="og-preview">
    <main class="og-preview-main">
      <div class="og-preview-hero">
        <img class="og-preview-toy" src="/images/handheld-toy.png" alt="" width="512" height="512" decoding="sync" />
        <div class="og-preview-titles" aria-hidden="true">
          <div class="og-preview-title-group og-preview-title-group--toy-objects">
            <span class="og-preview-title-line">TOY</span>
            <span class="og-preview-title-line">OBJECTS</span>
          </div>
          <div class="og-preview-title-group og-preview-title-group--mondrian-blocks">
            <span class="og-preview-title-line">MONDRIAN</span>
            <span class="og-preview-title-line">BLOCKS</span>
          </div>
        </div>
      </div>
    </main>
    <footer class="og-preview-footer">
      Crafted with <span class="og-preview-footer-heart" aria-hidden="true">♥️</span> by
      <a class="og-preview-footer-link og-preview-footer-link--amrit" href="https://amrit.art">Amrit</a>
      <span aria-hidden="true">&</span>
      <a class="og-preview-footer-link og-preview-footer-link--karan" href="https://karanwasabi.com">Karan</a>
    </footer>
  </body>
</html>
